name = "betterauth-worker"
main = "src/index.ts"
compatibility_date = "2026-07-02"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "betterauth_auth"
database_id = "REPLACE_WITH_PROD_D1_DATABASE_ID"
preview_database_id = "local-betterauth-auth"

[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_PROD_KV_NAMESPACE_ID"
preview_id = "local-sessions"

[vars]
ENVIRONMENT = "production"
BETTER_AUTH_URL = "https://auth.example.com"
ALLOWED_ORIGINS = "https://app.example.com"

[env.dev]
name = "betterauth-worker-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "betterauth_auth_dev"
database_id = "REPLACE_WITH_DEV_D1_DATABASE_ID"

[[env.dev.kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_DEV_KV_NAMESPACE_ID"

[env.dev.vars]
ENVIRONMENT = "development"
BETTER_AUTH_URL = "https://auth-dev.example.com"
ALLOWED_ORIGINS = "https://app-dev.example.com,http://localhost:8891"
